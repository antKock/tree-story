<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variation C — Compact Recap + Immersive List</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #0f0f0f;
    --color-surface: #1a1a1a;
    --color-text-primary: #f0ece4;
    --color-text-muted: #7a7672;
    --color-accent: #d4935a;
    --font-prose: 'Lora', serif;
    --font-ui: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: var(--font-ui);
    max-width: 420px;
    margin: 0 auto;
    height: 100vh;
    overflow: hidden;
  }

  /* =============================================
     VARIATION C: Compact Recap + Immersive List

     Score recap is condensed into a horizontal bar
     at the top (tier emoji + label + score in one
     line). This maximizes leaderboard space and
     makes the ranking the hero of the screen.
     The button is integrated into the bottom with
     a surface-colored backdrop.
     ============================================= */

  .screen {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 0 1.5rem;
  }

  /* --- Compact Score Bar (single line) --- */
  .score-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .score-bar .tier-emoji {
    font-size: 32px;
    line-height: 1;
  }

  .score-bar .tier-info {
    flex: 1;
  }

  .score-bar .tier-label {
    font-family: var(--font-prose);
    font-size: 17px;
    font-weight: 600;
    color: var(--color-text-primary);
    line-height: 1.2;
  }

  .score-bar .tier-flavor {
    font-family: var(--font-prose);
    font-style: italic;
    font-size: 13px;
    color: var(--color-text-muted);
    line-height: 1.3;
    margin-top: 2px;
  }

  .score-bar .score-block {
    text-align: right;
    flex-shrink: 0;
  }

  .score-bar .score-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--color-accent);
    line-height: 1;
  }

  .score-bar .score-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-muted);
  }

  /* --- Leaderboard (maximized space) --- */
  .leaderboard-section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding-top: 0.75rem;
  }

  .leaderboard-header {
    flex-shrink: 0;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--color-text-muted);
    padding-bottom: 0.5rem;
  }

  .leaderboard-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Card-style rows (from spec G3) */
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1rem;
    font-size: 14px;
    border-radius: 8px;
    margin-bottom: 4px;
    background: transparent;
    transition: background 0.15s;
  }

  .entry .rank {
    width: 24px;
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }

  .entry .name {
    flex: 1;
    color: var(--color-text-muted);
  }

  .entry .score {
    font-variant-numeric: tabular-nums;
    color: var(--color-text-muted);
  }

  .entry.current {
    background: color-mix(in srgb, var(--color-accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--color-accent) 20%, transparent);
  }

  .entry.current .rank {
    color: var(--color-accent);
    font-weight: 600;
  }

  .entry.current .name {
    color: var(--color-text-primary);
    font-weight: 600;
  }

  .entry.current .score {
    color: var(--color-accent);
    font-weight: 600;
  }

  /* --- Bottom area: button on surface backdrop --- */
  .footer {
    flex-shrink: 0;
    margin: 0 -1.5rem;
    padding: 0.75rem 1.5rem 2rem;
    background: var(--color-surface);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .replay-btn {
    display: block;
    width: 100%;
    min-height: 48px;
    border: none;
    border-radius: 8px;
    background: var(--color-accent);
    color: var(--color-bg);
    font-family: var(--font-ui);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .replay-btn:hover { opacity: 0.85; }

  .variation-label {
    position: fixed;
    top: 8px;
    right: 8px;
    background: rgba(212,147,90,0.2);
    color: var(--color-accent);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: var(--font-ui);
    z-index: 10;
  }
</style>
</head>
